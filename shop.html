<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polly's Tech Store | Premium Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-soft: rgba(99, 102, 241, 0.1);
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --sidebar: #ffffff;
            --border: #e5e7eb;
            --sidebar-w: 280px;
            --glass: rgba(255, 255, 255, 0.8);
        }

        [data-theme="dark"] {
            --bg: #0b0f1a;
            --card: #161b2c;
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --sidebar: #111827;
            --border: #2d3748;
            --glass: rgba(17, 24, 39, 0.8);
            --primary-soft: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; transition: background 0.3s, border-color 0.3s, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- SIDEBAR (OFF-CANVAS LOGIC) --- */
        aside { 
            width: var(--sidebar-w); 
            height: 100vh; 
            background: var(--sidebar); 
            position: fixed; 
            padding: 25px; 
            border-right: 1px solid var(--border); 
            z-index: 1000; 
            overflow-y: auto;
            left: 0; /* Visible en PC */
            transition: transform 0.3s ease-in-out;
        }

        .logo-container { padding-bottom: 20px; margin-bottom: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-size: 1.8rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -1.5px; }

        /* --- FILTROS --- */
        .filter-section { margin-bottom: 30px; }
        .filter-title { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; letter-spacing: 1.2px; }
        .filter-title i { color: var(--primary); font-size: 0.8rem; }
        .filter-option { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; cursor: pointer; font-size: 0.9rem; padding: 10px; border-radius: 12px; font-weight: 500; }
        .filter-option:hover { background: var(--primary-soft); color: var(--primary); }
        .filter-option input { accent-color: var(--primary); width: 18px; height: 18px; cursor: pointer; }

        .price-range { width: 100%; margin-top: 10px; }
        .price-range input { width: 100%; accent-color: var(--primary); cursor: pointer; }
        .price-labels { display: flex; justify-content: space-between; font-size: 0.75rem; margin-top: 5px; font-weight: 600; }

        /* --- MAIN --- */
        main { margin-left: var(--sidebar-w); width: calc(100% - var(--sidebar-w)); padding: 40px; transition: all 0.3s ease; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 40px; 
            background: var(--glass); 
            backdrop-filter: blur(12px); 
            padding: 15px 25px; 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            position: sticky; 
            top: 20px; 
            z-index: 900; 
        }

        /* --- BOTÓN HAMBURGUESA --- */
        #menu-btn {
            display: none; /* Oculto en PC */
            background: var(--primary);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            align-items: center;
            justify-content: center;
        }

        /* --- BOTÓN CERRAR SIDEBAR (MÓVIL) --- */
        .close-sidebar {
            display: none;
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        .color-selector { display: flex; gap: 10px; align-items: center; }
        .c-btn { width: 22px; height: 22px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        
        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        .card { background: var(--card); border-radius: 28px; padding: 18px; border: 1px solid var(--border); position: relative; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-12px); box-shadow: 0 25px 35px -12px rgba(0,0,0,0.12); border-color: var(--primary); }
        .img-container { width: 100%; height: 220px; border-radius: 22px; overflow: hidden; background: #f9fafb; margin-bottom: 18px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card h3 { font-size: 1rem; margin: 10px 0; font-weight: 700; color: var(--text); height: 2.8em; overflow: hidden; }
        .price-tag { background: var(--primary-soft); color: var(--primary); padding: 6px 14px; border-radius: 12px; font-weight: 800; font-size: 1.2rem; display: inline-block; margin-bottom: 20px; }
        .add-btn { width: 100%; border: none; background: var(--primary); color: white; padding: 14px; border-radius: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* --- CARRITO --- */
        #cart-fab { position: fixed; bottom: 35px; right: 35px; width: 65px; height: 65px; background: var(--primary); color: white; border-radius: 22px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); z-index: 1000; }
        .badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; min-width: 26px; height: 26px; border-radius: 50%; font-size: 0.8rem; font-weight: 800; display: flex; justify-content: center; align-items: center; border: 4px solid var(--bg); }
        #cart-box { position: fixed; bottom: 115px; right: 35px; width: 400px; background: var(--card); border-radius: 30px; border: 1px solid var(--border); box-shadow: 0 25px 60px rgba(0,0,0,0.2); padding: 30px; display: none; z-index: 1001; max-height: 70vh; overflow-y: auto; }
        #cart-box.show { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .close-cart { position: absolute; top: 20px; right: 25px; font-size: 1.2rem; color: var(--text-muted); cursor: pointer; }

        .cart-item { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .cart-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: var(--bg); }
        .cart-info { flex: 1; }
        .qty-controls { display: flex; gap: 12px; background: var(--bg); padding: 6px 14px; border-radius: 14px; align-items: center; }
        .q-btn { border: none; background: none; cursor: pointer; color: var(--primary); font-weight: 800; }
        .total { font-size: 1.3rem; margin-top: 20px; font-weight: 800; display: flex; justify-content: space-between;}

        /* Estilo para el botón de eliminar */
        .remove-btn { border: none; background: none; color: #ef4444; cursor: pointer; font-size: 1.1rem; padding: 5px; margin-left: 5px; transition: 0.2s; }
        .remove-btn:hover { transform: scale(1.1); }

        /* --- MEDIA QUERIES PARA MÓVIL --- */
        @media (max-width: 1024px) {
            aside {
                transform: translateX(-100%); /* Escondido a la izquierda */
            }
            aside.open {
                transform: translateX(0); /* Desliza hacia adentro */
                box-shadow: 10px 0 50px rgba(0,0,0,0.3);
            }
            main {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
            #menu-btn {
                display: flex; /* Aparece el botón de 3 líneas */
            }
            .close-sidebar {
                display: block; /* Aparece la X dentro del menú */
            }
            #cart-box {
                width: 90%;
                right: 5%;
            }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body data-theme="light">

    <aside id="sidebar-menu">
        <div class="logo-container">
            <a href="#" class="logo-text" id="dynamic-logo">POLLY.</a>
            <i class="fas fa-times close-sidebar" onclick="toggleSidebar()"></i>
        </div>
        
        <div class="filter-section">
            <span class="filter-title"><i class="fas fa-th-large"></i> Categorías</span>
            <label class="filter-option"><input type="checkbox" class="f-cat" value="Hardware" onchange="runFilters()"> Hardware</label>
            <label class="filter-option"><input type="checkbox" class="f-cat" value="Periféricos" onchange="runFilters()"> Periféricos</label>
            <label class="filter-option"><input type="checkbox" class="f-cat" value="VR" onchange="runFilters()"> VR</label>
        </div>

        <div class="filter-section">
            <span class="filter-title"><i class="fas fa-tag"></i> Presupuesto</span>
            <div class="price-range">
                <input type="range" min="100" max="5000" value="5000" id="priceRange" oninput="updatePriceLabel(this.value)">
                <div class="price-labels">
                    <span>S/ 100</span>
                    <span id="rangeValue" style="color: var(--primary)">S/ 5000</span>
                </div>
            </div>
        </div>

        <div class="filter-section">
            <span class="filter-title"><i class="fas fa-bolt"></i> Ofertas Especiales</span>
            <label class="filter-option"><input type="checkbox" class="f-check" onchange="runFilters()"> Solo Ofertas</label>
        </div>

        <div class="filter-section">
            <span class="filter-title"><i class="fas fa-palette"></i> Color</span>
            <label class="filter-option"><input type="checkbox" class="f-color" data-color="negro" onchange="runFilters()"> Negro</label>
            <label class="filter-option"><input type="checkbox" class="f-color" data-color="blanco" onchange="runFilters()"> Blanco</label>
            <label class="filter-option"><input type="checkbox" class="f-color" data-color="rojo" onchange="runFilters()"> Rojo</label>
        </div>

        <div class="filter-section">
            <span class="filter-title"><i class="fas fa-box-open"></i> Estado</span>
            <label class="filter-option"><input type="radio" name="status" value="all" checked onchange="runFilters()"> Todos</label>
            <label class="filter-option"><input type="radio" name="status" value="Nuevo" onchange="runFilters()"> Nuevo</label>
            <label class="filter-option"><input type="radio" name="status" value="Reacondicionado" onchange="runFilters()"> Reacondicionado</label>
        </div>
    </aside>

    <main>
        <header>
            <div style="display: flex; align-items: center; gap: 20px;">
                <button id="menu-btn" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>

                <div class="color-selector">
                    <div class="c-btn" style="background: #6366f1;" onclick="setPageColor('#6366f1')"></div>
                    <div class="c-btn" style="background: #f43f5e;" onclick="setPageColor('#f43f5e')"></div>
                    <div class="c-btn" style="background: #10b981;" onclick="setPageColor('#10b981')"></div>
                    <div class="c-btn" style="background: #f59e0b;" onclick="setPageColor('#f59e0b')"></div>
                </div>
            </div>
            <button onclick="toggleDark()" style="border:none; background:var(--primary-soft); cursor:pointer; color:var(--primary); width: 45px; height: 45px; border-radius: 15px;"><i class="fas fa-moon"></i></button>
        </header>
        <div class="grid" id="p-grid"></div>
    </main>

    <div id="cart-fab" onclick="event.stopPropagation(); toggleCart();"><i class="fas fa-shopping-bag"></i><div class="badge" id="b-count">0</div></div>
    
    <div id="cart-box" onclick="event.stopPropagation()">
        <i class="fas fa-times close-cart" onclick="toggleCart()"></i>
        <h3 style="margin:0 0 25px 0; font-weight: 800;">Pedido Actual</h3>
        <div id="cart-list"></div>
        <div class="total">
            <span>Total:</span>
            <span id="t-price">S/ 0.00</span>
        </div>
        <button class="add-btn" style="margin-top:25px;">Checkout</button>
    </div>

    <script>
        const products = [
            { id: 1, color: 'negro', promo: true, cat: "VR", status: "Nuevo", name: "Gafas VR Pico 4 Ultra 4K", price: 2124.89, img: "https://i.blogs.es/ebb72c/photo-1622979135225-d2ba269cf1ac/1024_2000.jpeg" },
            { id: 2, color: 'blanco', promo: false, cat: "VR", status: "Nuevo", name: "Meta Quest 3 Pro White", price: 1985.54, img: "https://i.blogs.es/5ea9c7/realidad-virtual-meta/840_560.jpeg" },
            { id: 3, color: 'negro', promo: true, cat: "Hardware", status: "Nuevo", name: "Razer Blade RTX 4060", price: 3450.00, img: "https://gotoclient.com/wp-content/uploads/2020/07/channel-program-700x875.jpeg" },
            { id: 4, color: 'rojo', promo: true, cat: "Periféricos", status: "Nuevo", name: "Logitech G-Pro Red", price: 125.00, img: "https://resource.logitechg.com/w_776,h_437,ar_16:9,c_fill,q_auto,f_auto,dpr_1.0/d_transparent.gif/content/dam/gaming/en/products/pro-2-lightspeed/pro2-lightspeed-feature4.jpg" },
            { id: 5, color: 'blanco', promo: false, cat: "Periféricos", status: "Reacondicionado", name: "Teclado Mecánico 60%", price: 220.50, img: "https://upload.wikimedia.org/wikipedia/commons/9/96/Apple-wireless-keyboard-aluminum-2007.jpg" },
            { id: 6, color: 'negro', promo: false, cat: "Periféricos", status: "Nuevo", name: "Sony WH-1000XM5 Black", price: 1450.00, img: "https://soundcharts.com/img/blog/en/playlist-pitching.jpg" },
            { id: 7, color: 'blanco', promo: true, cat: "Hardware", status: "Nuevo", name: "Apple Watch Series 9", price: 1650.00, img: "https://miro.medium.com/v2/resize:fit:720/format:webp/0*xll9mhuCjFLtzTYT" },
            { id: 8, color: 'negro', promo: false, cat: "Hardware", status: "Reacondicionado", name: "Cámara Mirrorless 4K", price: 4200.00, img: "https://bargainfotos.com/blog/wp-content/uploads/2022/10/brent-ninaber-6qesnUQceJA-unsplash.jpg" },
            { id: 9, color: 'blanco', promo: true, cat: "Periféricos", status: "Nuevo", name: "Parlante HomePod", price: 890.00, img: "https://http2.mlstatic.com/D_Q_NP_677601-MLC54199188057_032023-F.webp" },
            { id: 10, color: 'negro', promo: false, cat: "Hardware", status: "Nuevo", name: "Monitor Gaming 144Hz", price: 1100.00, img: "https://www.kabifperu.com/imagenes/prod-05022021224018-monitor-aoc-led-24-c24g1-gaming-deta.png" },
            { id: 11, color: 'rojo', promo: false, cat: "Periféricos", status: "Nuevo", name: "Silla Gaming Ergo", price: 750.00, img: "https://http2.mlstatic.com/D_Q_NP_605482-MPE52501057438_112022-F.webp" },
            { id: 12, color: 'blanco', promo: true, cat: "Hardware", status: "Nuevo", name: "Smartphone Flagship", price: 3100.00, img: "https://oechsle.vteximg.com.br/arquivos/ids/24717854-1000-1000/image-bf8ebc73d1f94e659f32893aeeb9712c.jpg?v=639094707094270000" },
            { id: 13, color: 'negro', promo: false, cat: "Hardware", status: "Nuevo", name: "Drone 4K Pro", price: 2800.00, img: "https://http2.mlstatic.com/D_Q_NP_941931-MLA99927467427_112025-F.webp" },
            { id: 14, color: 'rojo', promo: true, cat: "Periféricos", status: "Reacondicionado", name: "Audífonos Sport BT", price: 199.00, img: "https://www.miccell.com.pe/cdn/shop/files/audifonobluetooth-headset_VQ-BH17.webp?v=1701736221&width=1500" },
            { id: 15, color: 'blanco', promo: false, cat: "Hardware", status: "Nuevo", name: "Tablet Pro 12.9'", price: 3900.00, img: "https://http2.mlstatic.com/D_Q_NP_802599-MLA48558210615_122021-F.webp" }
        ];

        let cart = [];

        // Función para abrir/cerrar Sidebar
        function toggleSidebar() {
            document.getElementById('sidebar-menu').classList.toggle('open');
        }

        // Cerrar al hacer clic fuera del carrito o sidebar
        window.onclick = (e) => {
            const side = document.getElementById('sidebar-menu');
            const cartBox = document.getElementById('cart-box');
            
            if (e.target !== side && !side.contains(e.target) && e.target.id !== 'menu-btn' && !document.getElementById('menu-btn').contains(e.target)) {
                side.classList.remove('open');
            }
            if (cartBox.classList.contains('show')) {
                cartBox.classList.remove('show');
            }
        };

        function updatePriceLabel(val) {
            document.getElementById('rangeValue').innerText = `S/ ${val}`;
            runFilters();
        }

        function runFilters() {
            const maxPrice = parseInt(document.getElementById('priceRange').value);
            const onlyPromo = document.querySelector('.f-check').checked;
            const selectedColors = Array.from(document.querySelectorAll('.f-color:checked')).map(c => c.dataset.color);
            const selectedCats = Array.from(document.querySelectorAll('.f-cat:checked')).map(c => c.value);
            const selectedStatus = document.querySelector('input[name="status"]:checked').value;

            let filtered = products.filter(p => {
                const matchPrice = p.price <= maxPrice;
                const matchPromo = onlyPromo ? p.promo : true;
                const matchColor = selectedColors.length > 0 ? selectedColors.includes(p.color) : true;
                const matchCat = selectedCats.length > 0 ? selectedCats.includes(p.cat) : true;
                const matchStatus = selectedStatus === 'all' ? true : p.status === selectedStatus;
                return matchPrice && matchPromo && matchColor && matchCat && matchStatus;
            });
            render(filtered);
        }

        function render(items) {
            const g = document.getElementById('p-grid');
            g.innerHTML = items.length ? items.map(p => `
                <div class="card">
                    <div class="img-container"><img src="${p.img}"></div>
                    <h3>${p.name}</h3>
                    <div class="price-tag">S/ ${p.price.toLocaleString()}</div>
                    <button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})"><i class="fas fa-cart-plus"></i> Agregar</button>
                </div>
            `).join('') : '<p style="grid-column:1/-1; text-align:center; padding: 50px;">No se encontraron productos.</p>';
        }

        function addToCart(id) {
            const item = cart.find(i => i.id === id);
            if(item) item.qty++;
            else cart.push({...products.find(x => x.id === id), qty: 1});
            updateUI();
        }

        function updateQty(id, d) {
            const i = cart.find(x => x.id === id);
            if(i) { i.qty += d; if(i.qty <= 0) cart = cart.filter(x => x.id !== id); }
            updateUI();
        }

        // NUEVA FUNCIÓN: Eliminar producto por completo
        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            document.getElementById('b-count').innerText = cart.reduce((a, b) => a + b.qty, 0);
            list.innerHTML = cart.map(i => `
                <div class="cart-item">
                    <img src="${i.img}" class="cart-img">
                    <div class="cart-info">
                        <div style="font-weight:700; font-size:0.8rem">${i.name}</div>
                        <div style="font-size:0.8rem">S/ ${(i.price * i.qty).toFixed(2)}</div>
                    </div>
                    <div class="qty-controls">
                        <button class="q-btn" onclick="updateQty(${i.id}, -1)">-</button>
                        <span>${i.qty}</span>
                        <button class="q-btn" onclick="updateQty(${i.id}, 1)">+</button>
                    </div>
                    <button class="remove-btn" onclick="removeFromCart(${i.id})">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
            const sum = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('t-price').innerText = `S/ ${sum.toLocaleString('es-PE', {minimumFractionDigits:2})}`;
        }

        function toggleCart() { document.getElementById('cart-box').classList.toggle('show'); }
        function setPageColor(c) { document.documentElement.style.setProperty('--primary', c); document.getElementById('dynamic-logo').style.color = c; }
        function toggleDark() { const b = document.body; b.dataset.theme = b.dataset.theme === 'dark' ? 'light' : 'dark'; }

        render(products);
    </script>
</body>
</html>
