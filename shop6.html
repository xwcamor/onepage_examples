<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Temu's 2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --ali-orange: #ff4747;
            --light-gray: #f2f2f2;
        }

        body {
            background-color: var(--light-gray);
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Navbar */
        .navbar-ali {
            background-color: white;
            padding: 15px 0;
            border-bottom: 1px solid #ddd;
        }

        .search-container {
            flex-grow: 1;
            max-width: 600px;
            margin: 0 20px;
        }

        .search-input {
            border: 2px solid var(--ali-orange);
            border-radius: 20px 0 0 20px;
        }

        .search-btn {
            background-color: var(--ali-orange);
            color: white;
            border: none;
            border-radius: 0 20px 20px 0;
            padding: 0 25px;
        }

        /* Botón Flotante Carrito (Derecha) */
        .cart-circle-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: var(--ali-orange);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: fixed;
            right: 30px;
            bottom: 30px;
            z-index: 1050;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: none;
        }

        /* Botón Flotante Filtros (Izquierda Inferior) */
        .filter-float-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background-color: #333;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: fixed;
            left: 30px;
            bottom: 30px;
            z-index: 1050;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: none;
        }

        /* Cards */
        .product-card {
            background: white;
            border: none;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            height: 100%;
        }

        .product-card:hover {
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            transform: translateY(-3px);
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .price-tag {
            color: #191919;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Panel Lateral */
        .offcanvas { width: 350px !important; }
        .cart-item { display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-item img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body>

    <nav class="navbar-ali sticky-top">
        <div class="container d-flex align-items-center justify-content-between">
            <h3 class="fw-bold m-0" style="color: var(--ali-orange);">Temu 2.0</h3>
            <div class="input-group search-container">
                <input type="text" id="user-search" class="form-control search-input" placeholder="Buscar tecnología y juegos..." onkeyup="searchProducts()">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="d-none d-md-block">
                <span><i class="far fa-user"></i> Iniciar Sesión</span>
            </div>
            <div class="d-none d-md-block">
                <span><i class="far fa-user"></i> Registrarse</span>
            </div>
        </div>
    </nav>

    <button class="cart-circle-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">
        <i class="fas fa-shopping-cart"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark" id="cart-count">0</span>
    </button>

    <button class="filter-float-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#filterSidebar">
        <i class="fas fa-tasks"></i>
    </button>

    <div class="container mt-5 mb-5">
        <div class="row g-4" id="product-grid">
            </div>
    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="filterSidebar">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold">Filtrar por Categoría</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div class="list-group">
                <label class="list-group-item">
                    <input class="form-check-input me-2" type="checkbox" value="accion" onchange="filterProducts()"> Acción
                </label>
                <label class="list-group-item">
                    <input class="form-check-input me-2" type="checkbox" value="aventura" onchange="filterProducts()"> Aventura
                </label>
                <label class="list-group-item">
                    <input class="form-check-input me-2" type="checkbox" value="lucha" onchange="filterProducts()"> Lucha
                </label>
                <label class="list-group-item">
                    <input class="form-check-input me-2" type="checkbox" value="deportes" onchange="filterProducts()"> Deportes
                </label>
            </div>
            <button class="btn btn-secondary w-100 mt-4" onclick="resetFilters()">Mostrar todos</button>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold">Mi Carrito</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="cart-items-container">
            <p class="text-muted text-center mt-5">Tu carrito está vacío.</p>
        </div>
        <div class="offcanvas-footer p-4 border-top">
            <div class="d-flex justify-content-between mb-3">
                <span class="h5">Total:</span>
                <span class="h5 fw-bold" id="cart-total">S/ 0.00</span>
            </div>
            <button class="btn btn-danger w-100 py-3 rounded-pill fw-bold">PAGAR AHORA</button>
        </div>
    </div>

    <script>
        // DATOS DE LOS 8 PRODUCTOS
        const products = [
            { id: 1, name: "Halo Infinite", price: 150, cat: "accion", img: "https://alfabetajuega.com/hero/2020/04/halo-infinite-portada.jpg?width=768&aspect_ratio=16:9&format=nowebp" },
            { id: 2, name: "Call of Duty", price: 200, cat: "accion", img: "https://image.api.playstation.com/vulcan/img/cfn/11307CjjUZ9rA_whmJUghJsG9Hl1-rmnOUTk3-nccj01ZpYMCHrJ8k8kzBrVyp-p-iCPej73TEJAs88ZBeiZ1uirtj0fsa16.png" },
            { id: 3, name: "Zelda: TotK", price: 250, cat: "aventura", img: "https://i.redd.it/tjv3z5yjcreb1.jpg" },
            { id: 4, name: "Uncharted 4", price: 100, cat: "aventura", img: "https://static.wikia.nocookie.net/unchartedpedia/images/8/8f/Uncharted_4_portada.jpeg/revision/latest?cb=20211230130123&path-prefix=es" },
            { id: 5, name: "Mortal Kombat 1", price: 180, cat: "lucha", img: "https://static.wikia.nocookie.net/mortalkombat/images/8/88/MK1_portada.jpg/revision/latest/scale-to-width-down/300?cb=20230828165829&path-prefix=es" },
            { id: 6, name: "Street Fighter 6", price: 170, cat: "lucha", img: "https://image.api.playstation.com/vulcan/ap/rnd/202211/1407/XFU0aPBvtm3W2od1ZvhByAOv.png" },
            { id: 7, name: "FIFA 25", price: 220, cat: "deportes", img: "https://media.vandal.net/i/620x620/7-2024/17/20247171622978_1.jpg" },
            { id: 8, name: "NBA 2K25", price: 210, cat: "deportes", img: "https://image.api.playstation.com/vulcan/ap/rnd/202406/0623/f8f6ab8b26cf457674ffae29a286b998df5ab255e0665102.jpg?w=440" }
        ];

        let cart = [];
        const grid = document.getElementById('product-grid');

        // FUNCIÓN PARA MOSTRAR PRODUCTOS
        function displayProducts(filteredList) {
            grid.innerHTML = '';
            filteredList.forEach(p => {
                grid.innerHTML += `
                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="product-card p-3 shadow-sm">
                            <img src="${p.img}" class="product-img mb-2" alt="${p.name}">
                            <p class="text-truncate mb-1 fw-bold">${p.name}</p>
                            <p class="price-tag mb-1">S/ ${p.price.toFixed(2)}</p>
                            <small class="text-uppercase text-muted" style="font-size:10px">${p.cat}</small>
                            <button class="btn btn-outline-danger w-100 mt-2 rounded-pill btn-sm" 
                                onclick="addToCart('${p.name}', ${p.price}, '${p.img}')">Añadir</button>
                        </div>
                    </div>
                `;
            });
        }

        // LÓGICA DE FILTRADO
        function filterProducts() {
            const checkboxes = document.querySelectorAll('.form-check-input:checked');
            const selectedCats = Array.from(checkboxes).map(cb => cb.value);
            
            if (selectedCats.length === 0) {
                displayProducts(products);
            } else {
                const filtered = products.filter(p => selectedCats.includes(p.cat));
                displayProducts(filtered);
            }
        }

        function resetFilters() {
            document.querySelectorAll('.form-check-input').forEach(cb => cb.checked = false);
            displayProducts(products);
        }

// LÓGICA DEL CARRITO MEJORADA
        function addToCart(name, price, img) {
            // Buscamos si el producto ya existe en el carrito
            const existingItem = cart.find(item => item.name === name);

            if (existingItem) {
                existingItem.quantity += 1; // Si existe, aumentamos cantidad
            } else {
                cart.push({ name, price, img, quantity: 1 }); // Si no, lo agregamos con cantidad 1
            }
            updateCartUI();
        }

        function updateCartUI() {
            // El contador del botón ahora suma todas las cantidades
            document.getElementById('cart-count').innerText = cart.reduce((acc, item) => acc + item.quantity, 0);
            
            const container = document.getElementById('cart-items-container');
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-muted text-center mt-5">Tu carrito está vacío.</p>';
                document.getElementById('cart-total').innerText = 'S/ 0.00';
                return;
            }

            container.innerHTML = '';
            let total = 0;

            cart.forEach((item, i) => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                
                container.innerHTML += `
                    <div class="cart-item align-items-center">
                        <img src="${item.img}">
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start">
                                <h6 class="mb-0 small fw-bold" style="max-width: 80%">${item.name}</h6>
                                <button class="btn btn-sm text-danger p-0" onclick="removeItem(${i})">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <p class="mb-1 text-danger small">S/ ${item.price.toFixed(2)}</p>
                            
                            <div class="d-flex align-items-center mt-2">
                                <button class="btn btn-outline-dark btn-sm py-0 px-2" onclick="changeQuantity(${i}, -1)">-</button>
                                <span class="mx-3 small fw-bold">${item.quantity}</span>
                                <button class="btn btn-outline-dark btn-sm py-0 px-2" onclick="changeQuantity(${i}, 1)">+</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = `S/ ${total.toFixed(2)}`;
        }

        // Función para sumar o restar cantidad
        function changeQuantity(index, delta) {
            cart[index].quantity += delta;
            
            // Si la cantidad llega a 0, eliminamos el producto
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
        }

        function removeItem(i) { 
            cart.splice(i, 1); 
            updateCartUI(); 
        }

        function removeItem(i) { cart.splice(i, 1); updateCartUI(); }

        // Inicializar
        displayProducts(products);

        // NUEVA FUNCIÓN DE BÚSQUEDA
        function searchProducts() {
            const text = document.getElementById('user-search').value.toLowerCase();
            
            // Filtramos el array original basándonos en el nombre
            const filtered = products.filter(p => {
                return p.name.toLowerCase().includes(text);
            });

            // Mostramos solo los resultados que coinciden
            displayProducts(filtered);
        }
    </script>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
