<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentWeb | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003b7e;
            --primary-hover: #0056b3;
            --accent-gold: #ffcc00;
            --text-dark: #1a202c;
            --price-red: #e53e3e;
            --border: #edf2f7;
            --bg-light: #f0f4f8;
            --card-bg: #ffffff;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --glass: rgba(255, 255, 255, 0.8);
        }

        body.dark-mode {
            --bg-light: #0f172a;
            --text-dark: #f1f5f9;
            --card-bg: #1e293b;
            --border: #334155;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --glass: rgba(30, 41, 59, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: var(--text-dark); overflow-x: hidden; scroll-behavior: smooth; transition: background 0.3s ease; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            background: linear-gradient(135deg, var(--primary-blue), #001f42);
            backdrop-filter: blur(15px);
            padding: 15px 6%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .logo { 
            font-family: 'Montserrat', sans-serif;
            font-size: 30px; 
            font-weight: 800; 
            letter-spacing: -1.5px;
            cursor: pointer;
            background: linear-gradient(to right, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* AJUSTE DE LA CAJA DE BUSQUEDA */
        .search-box { flex: 0 1 400px; display: flex; border-radius: 12px; overflow: hidden; background: white; padding: 2px; margin: 0 10px; height: 45px; }
        .search-box input { width: 100%; padding: 0 15px; border: none; outline: none; font-size: 14px; color: #333; }
        .search-box button { background: var(--accent-gold); border: none; padding: 0 15px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }

        .header-actions { display: flex; align-items: center; gap: 10px; }

        .theme-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
            height: 40px;
            width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-status { 
            cursor: pointer; font-weight: 700; padding: 8px 15px; border-radius: 12px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s; position: relative; white-space: nowrap; height: 40px;
            display: flex; align-items: center;
        }

        .container { display: flex; max-width: 1500px; margin: 30px auto; padding: 0 20px; gap: 30px; }
        
        aside { 
            width: 280px; background: var(--glass); backdrop-filter: blur(10px); 
            padding: 30px; border-radius: 24px; height: fit-content; 
            box-shadow: var(--card-shadow); border: 1px solid var(--border);
            position: sticky; top: 110px; transition: left 0.4s ease;
        }

        .filter-section { margin-bottom: 30px; }
        .filter-section h3 { font-size: 18px; margin-bottom: 15px; color: var(--primary-blue); display: flex; align-items: center; gap: 8px; }
        body.dark-mode .filter-section h3 { color: var(--accent-gold); }

        .price-filter { width: 100%; cursor: pointer; accent-color: var(--primary-blue); }
        .price-values { display: flex; justify-content: space-between; font-weight: 700; margin-top: 10px; color: var(--primary-blue); }

        .product-grid { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; animation: slideUp 0.8s ease; }

        .card {
            background: var(--card-bg); padding: 25px; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; border-radius: 24px; box-shadow: var(--card-shadow);
            position: relative; overflow: hidden; border: 1px solid transparent;
        }
        .card::before { content: "NUEVO"; position: absolute; top: 15px; left: -30px; background: var(--accent-gold); color: var(--primary-blue); padding: 5px 35px; transform: rotate(-45deg); font-size: 10px; font-weight: 800; }
        
        .card:hover { transform: translateY(-15px) scale(1.02); border-color: var(--accent-gold); }
        .card img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 20px; transition: 0.5s; }

        .desc-text { font-size: 13px; color: #64748b; margin-bottom: 15px; height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .btn-action {
            background: var(--primary-blue); color: white; border: none; padding: 15px;
            border-radius: 14px; font-weight: 700; cursor: pointer; width: 100%; 
            transition: 0.3s; text-transform: uppercase;
        }

        .mobile-filter-trigger {
            display: none; position: fixed; bottom: 30px; left: 30px; 
            background: var(--primary-blue); color: white; width: 60px; height: 60px; 
            border-radius: 50%; align-items: center; justify-content: center; 
            font-size: 24px; z-index: 1100; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 2px solid var(--accent-gold);
        }

        .ws-float {
            position: fixed; bottom: 30px; right: 30px; background: #25d366; color: white;
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 30px; box-shadow: 0 10px 25px rgba(37,211,102,0.4);
            z-index: 1000; cursor: pointer; transition: 0.3s; text-decoration: none;
        }

        @media (max-width: 1000px) { 
            header { padding: 10px 4%; }
            .logo { font-size: 22px; }
            .search-box { flex: 1; height: 38px; margin: 0 8px; }
            .search-box input { padding: 0 10px; font-size: 13px; }
            .search-box button { padding: 0 12px; font-size: 16px; }
            .header-actions { gap: 8px; }
            .theme-toggle, .cart-status { height: 35px; padding: 0 10px; font-size: 14px; }
            
            .product-grid { grid-template-columns: repeat(2, 1fr); } 
            .container { flex-direction: column; } 
            .mobile-filter-trigger { display: flex; }
            aside { 
                position: fixed; left: -320px; top: 0; bottom: 0; 
                z-index: 2000; width: 300px; height: 100vh; 
                border-radius: 0 24px 24px 0; overflow-y: auto;
            }
            aside.active { left: 0; }
        }
        @media (max-width: 600px) { 
            .product-grid { grid-template-columns: 1fr; } 
            .logo { display: none; } /* Ocultar logo en móviles muy pequeños para dar espacio a la búsqueda */
        }
    </style>
</head>
<body>

<a href="https://wa.me/51900000000" class="ws-float" target="_blank">📞</a>
<div class="mobile-filter-trigger" onclick="toggleMobileFilters()">📂</div>
<div id="main-overlay" class="overlay" onclick="closeAll()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; backdrop-filter: blur(8px);"></div>

<header>
    <div class="logo" onclick="goHome()">VENTWEB</div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="¿Qué buscas hoy?" onkeyup="filterData()">
        <button onclick="filterData()">🔎</button>
    </div>
    <div class="header-actions">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <div class="cart-status" onclick="toggleCart()">🛒 <span id="cart-count" style="background:var(--accent-gold); color:var(--primary-blue); padding:1px 6px; border-radius:10px; font-size:11px; margin-left:4px;">0</span></div>
    </div>
</header>

<div class="container">
    <aside id="filterSidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>🏷️ Marcas</h3>
        </div>
        <div class="filter-section">
            <div class="filter-group">
                <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer; font-weight:600;"><input type="checkbox" class="brand-cb" value="Apple" onclick="filterData()"> Apple</label>
                <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer; font-weight:600;"><input type="checkbox" class="brand-cb" value="Samsung" onclick="filterData()"> Samsung</label>
                <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer; font-weight:600;"><input type="checkbox" class="brand-cb" value="Xiaomi" onclick="filterData()"> Xiaomi</label>
                <label style="display:flex; align-items:center; gap:12px; margin-bottom:12px; cursor:pointer; font-weight:600;"><input type="checkbox" class="brand-cb" value="Motorola" onclick="filterData()"> Motorola</label>
            </div>
        </div>

        <div class="filter-section">
            <h3>💰 Presupuesto</h3>
            <input type="range" id="priceRange" class="price-filter" min="1000" max="5000" step="100" value="5000" oninput="updatePriceLabel(); filterData();">
            <div class="price-values">
                <span>S/ 1,000</span>
                <span id="priceLabel">S/ 5,000</span>
            </div>
        </div>
    </aside>
    <main class="product-grid" id="grid"></main>
</div>

<div id="qty-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); padding:40px; border-radius:30px; z-index:2001; width:90%; max-width:450px; box-shadow:0 40px 100px rgba(0,0,0,0.5);">
    <h2 id="m-name" style="font-size:24px; margin-bottom:20px; font-weight:800; color:var(--primary-blue);"></h2>
    <div style="display:flex; align-items:center; gap:30px; flex-wrap: wrap;">
        <img id="m-img" src="" style="width:120px; border-radius:15px; background: #f8fafc; padding: 10px;">
        <div>
            <div style="display:flex; border:2px solid #e2e8f0; border-radius:15px; overflow:hidden; width:fit-content; background:white;">
                <button onclick="changeQty(-1)" style="padding:12px 18px; border:none; background:#f1f5f9; cursor:pointer; font-weight:bold; color: #333;">-</button>
                <input type="text" id="m-qty" value="1" readonly style="width:50px; text-align:center; border:none; font-weight:800; font-size:18px; color: #333;">
                <button onclick="changeQty(1)" style="padding:12px 18px; border:none; background:#f1f5f9; cursor:pointer; font-weight:bold; color: #333;">+</button>
            </div>
            <div id="m-subtotal" style="margin-top:20px; font-weight:800; color:var(--price-red); font-size: 22px;"></div>
        </div>
    </div>
    <button class="btn-action" style="margin-top:35px;" onclick="confirmAdd()">CONFIRMAR Y AGREGAR</button>
</div>

<div id="side-cart" style="position: fixed; right: -450px; top: 0; width: 100%; max-width: 400px; height: 100%; background: white; z-index: 2000; transition: 0.5s; padding: 30px; display: flex; flex-direction: column; box-shadow: -15px 0 40px rgba(0,0,0,0.1);">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #f1f5f9; padding-bottom:20px;">
        <h2 style="font-size:24px; font-weight:800; color:var(--primary-blue);">Mi Pedido</h2>
        <button onclick="closeAll()" style="border:none; background:none; font-size:35px; cursor:pointer; color:#94a3b8;">&times;</button>
    </div>
    <div id="cart-list" style="flex:1; overflow-y:auto; margin-top:20px; padding-right: 5px;"></div>
    <div style="background: #f8fafc; padding: 30px; border-radius: 20px; border: 1px solid #e2e8f0;">
        <div style="display:flex; justify-content:space-between; font-size:26px; font-weight:800; color:var(--primary-blue);">
            <span>Total:</span>
            <span id="grand-total">S/ 0.00</span>
        </div>
        <button class="btn-action" style="margin-top:25px; background:#22c55e;">COMPRAR POR WHATSAPP</button>
    </div>
</div>

<script>
    // Se mantiene exactamente tu lógica de productos y funciones
    const products = [
        { id: 0, brand: "Apple", name: "iPhone 10", price: 1850, img: "https://http2.mlstatic.com/D_NQ_626158-MLA86036470486_062025-V.webp", desc: "Pantalla Super Retina de 5.8 pulgadas y sistema de cámara dual Pro." },
        { id: 1, brand: "Samsung", name: "Smartphone Samsung S11 Pro", price: 2100, img: "https://pe.celulares.com/fotos/xiaomi-redmi-note-11-pro-93132-g-alt.jpg", desc: "Potencia increíble con procesador Exynos de última generación y carga ultra rápida." },
        { id: 2, brand: "Xiaomi", name: "Xiaomi Redmi Note 13", price: 1250, img: "https://promart.vteximg.com.br/arquivos/ids/8000907-1000-1000/image-56c7ad1931274c29aee37ded429e464e.jpg?v=638527707631370000", desc: "Cámara principal de 108MP y pantalla AMOLED de 120Hz para fluidez total." },
        { id: 3, brand: "Motorola", name: "Motorola Edge 40", price: 1550, img: "https://i.blogs.es/45176e/motorola-edge-40-1/450_1000.jpeg", desc: "Diseño curvo ultradelgado con protección IP68 y cámara de alta resolución." },
        { id: 4, brand: "Apple", name: "iPhone 13 Pro", price: 3800, img: "https://hiraoka.com.pe/media/catalog/product/i/p/iphone_13_pro_sierra_blue_pdp_image_position-1a__clco_v1.jpg?quality=85&bg-color=255,255,255&fit=bounds&height=560&width=700&canvas=700:560", desc: "Chip A15 Bionic, modo Cine y una batería optimizada para todo el día." },
        { id: 5, brand: "Samsung", name: "Samsung Galaxy S23 Ultra", price: 3200, img: "https://www.peru-smart.com/wp-content/uploads/2023/08/CELU574NEGRO-256GB.jpg", desc: "Fotografía nocturna avanzada y el mejor rendimiento para gaming extremo." },
        { id: 6, brand: "Xiaomi", name: "Xiaomi Poco F5 Pro", price: 1450, img: "https://plazavea.vteximg.com.br/arquivos/ids/28357477-418-418/image-c1bed31bc1ee46d088c28857fe142f44.jpg", desc: "Velocidad extrema con Snapdragon 8+ Gen 1 y pantalla WQHD+." },
        { id: 7, brand: "Motorola", name: "Motorola Moto G84", price: 1100, img: "https://claroperupoc.vtexassets.com/arquivos/ids/2143327/g84-viva-magenta.png?v=638926031751500000", desc: "Estilo premium con acabado de cuero vegano y pantalla de cine pOLED." },
        { id: 8, brand: "Apple", name: "iPhone 15 Pro Max", price: 4200, img: "https://pe.tiendasishop.com/cdn/shop/files/IMG-10935081.jpg?v=1722624491", desc: "Titanio aeroespacial, Dynamic Island y el zoom óptico más potente." }
    ];

    let cart = [];
    let activeProd = null;

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const btn = document.getElementById('themeBtn');
        btn.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }

    function toggleMobileFilters() {
        const sidebar = document.getElementById('filterSidebar');
        const overlay = document.getElementById('main-overlay');
        sidebar.classList.add('active');
        overlay.style.display = 'block';
    }

    function updatePriceLabel() {
        document.getElementById('priceLabel').innerText = `S/ ${parseInt(document.getElementById('priceRange').value).toLocaleString()}`;
    }

    function goHome() {
        document.getElementById('searchInput').value = '';
        document.querySelectorAll('.brand-cb').forEach(cb => cb.checked = false);
        document.getElementById('priceRange').value = 5000;
        updatePriceLabel();
        closeAll();
        render(products);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function render(data) {
        const grid = document.getElementById('grid');
        grid.innerHTML = data.map(p => `
            <div class="card">
                <img src="${p.img}">
                <div style="font-size:11px; color:var(--primary-blue); font-weight:800; text-transform:uppercase; letter-spacing:1px;">${p.brand}</div>
                <div style="font-size:16px; font-weight:700; margin:8px 0; height:45px;">${p.name}</div>
                <div class="desc-text">${p.desc}</div>
                <div style="color:var(--price-red); font-size:24px; font-weight:800; margin-bottom:20px;">S/ ${p.price.toLocaleString()}</div>
                <button class="btn-action" onclick="openQtyModal(${p.id})">Añadir al carrito</button>
            </div>
        `).join('');
    }

    function openQtyModal(id) {
        activeProd = products.find(p => p.id === id);
        document.getElementById('m-name').innerText = activeProd.name;
        document.getElementById('m-img').src = activeProd.img;
        document.getElementById('m-qty').value = 1;
        updateSubtotal();
        document.getElementById('qty-modal').style.display = 'block';
        document.getElementById('main-overlay').style.display = 'block';
    }

    function changeQty(delta) {
        let v = parseInt(document.getElementById('m-qty').value) + delta;
        if(v < 1) v = 1;
        document.getElementById('m-qty').value = v;
        updateSubtotal();
    }

    function updateSubtotal() {
        const q = parseInt(document.getElementById('m-qty').value);
        document.getElementById('m-subtotal').innerText = `S/ ${(q * activeProd.price).toLocaleString()}`;
    }

    function confirmAdd() {
        const q = parseInt(document.getElementById('m-qty').value);
        const ex = cart.find(item => item.id === activeProd.id);
        if(ex) ex.qty += q;
        else cart.push({ ...activeProd, qty: q });
        updateUI();
        closeAll();
        toggleCart(true);
    }

    function updateCartQty(index, delta) {
        cart[index].qty += delta;
        if(cart[index].qty < 1) remove(index);
        else updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        const badge = document.getElementById('cart-count');
        const total = document.getElementById('grand-total');
        let m = 0, c = 0;
        
        list.innerHTML = cart.map((item, i) => {
            m += (item.price * item.qty);
            c += item.qty;
            return `
                <div style="display:flex; gap:15px; margin-bottom:20px; padding:15px; background:rgba(0,0,0,0.05); border-radius:15px; border:1px solid #e2e8f0;">
                    <img src="${item.img}" style="width:65px; height:65px; object-fit:contain; border-radius:10px; background:white;">
                    <div style="flex:1;">
                        <div style="font-weight:700; font-size:14px; color:var(--primary-blue);">${item.name}</div>
                        <div style="display:flex; align-items:center; gap:12px; margin: 8px 0;">
                            <button class="cart-qty-btn" onclick="updateCartQty(${i}, -1)">-</button>
                            <span style="font-weight:800;">${item.qty}</span>
                            <button class="cart-qty-btn" onclick="updateCartQty(${i}, 1)">+</button>
                        </div>
                        <div style="color:var(--price-red); font-weight:800; font-size:16px;">S/ ${(item.price * item.qty).toLocaleString()}</div>
                    </div>
                    <button onclick="remove(${i})" style="border:none; background:none; cursor:pointer; color:#94a3b8; font-size:24px;">&times;</button>
                </div>`;
        }).join('');
        badge.innerText = c;
        total.innerText = `S/ ${m.toLocaleString()}`;
    }

    function remove(i) { cart.splice(i, 1); updateUI(); }
    
    function toggleCart(force = false) {
        const side = document.getElementById('side-cart');
        const over = document.getElementById('main-overlay');
        if(force || side.style.right === "-450px") { side.style.right = "0"; over.style.display = 'block'; }
        else closeAll();
    }

    function closeAll() {
        document.getElementById('side-cart').style.right = "-450px";
        document.getElementById('qty-modal').style.display = 'none';
        document.getElementById('main-overlay').style.display = 'none';
        document.getElementById('filterSidebar').classList.remove('active');
    }

    function filterData() {
        const text = document.getElementById('searchInput').value.toLowerCase();
        const maxPrice = parseInt(document.getElementById('priceRange').value);
        const brandsSel = Array.from(document.querySelectorAll('.brand-cb:checked')).map(cb => cb.value);
        
        const filtered = products.filter(p => {
            const matchText = p.name.toLowerCase().includes(text);
            const matchBrand = brandsSel.length === 0 || brandsSel.includes(p.brand);
            const matchPrice = p.price <= maxPrice;
            return matchText && matchBrand && matchPrice;
        });
        render(filtered);
    }

    render(products);
</script>
</body>
</html>
